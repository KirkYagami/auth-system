services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: auth_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE:      ${DATABASE_NAME:-auth_db}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - auth_net

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: auth_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongo:27017/${DATABASE_NAME:-auth_db}?authSource=admin
      # In prod the frontend is served by nginx on the same host — allow it
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://${HOST_IP:-localhost}"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - auth_net
    # Not exposed to host — nginx proxies /auth to it internally

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - auth_net

volumes:
  mongo_data:
    driver: local

networks:
  auth_net:
    driver: bridge
