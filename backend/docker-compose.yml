services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: auth_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${DATABASE_NAME:-auth_db}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"          # expose for local tooling (Compass, mongosh)
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - auth_net

  # ── FastAPI app (dev — hot reload via Dockerfile.dev) ────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: auth_api
    restart: unless-stopped
    env_file:
      - .env                   # real secrets — never committed
    environment:
      # Override MONGO_URI to use the service name, not localhost
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongo:27017/${DATABASE_NAME:-auth_db}?authSource=admin
      # AWS — passed through from .env
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_PROFILE_IMAGE_PREFIX: ${S3_PROFILE_IMAGE_PREFIX:-profile-images}
    volumes:
      # Mount source for hot reload — only the app package, not root clutter
      - ./app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy   # wait for mongo ping to succeed
    networks:
      - auth_net

# ── Persistent storage ────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# # ── Internal network ──────────────────────────────────────────────────────────
networks:
  auth_net:
    driver: bridge
